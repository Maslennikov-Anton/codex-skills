interface:
  display_name: "Документация OpenAI"
  short_description: "Официальные docs OpenAI и guidance по обновлениям"
  icon_small: "./assets/openai-small.svg"
  icon_large: "./assets/openai.png"
  default_prompt: "Используй $openai-docs, найди актуальную официальную документацию OpenAI, при необходимости подключи reference-файлы по GPT-5.4 и ответь кратко с цитированием источников."

dependencies:
  tools:
    - type: "mcp"
      value: "openaiDeveloperDocs"
      description: "MCP-сервер официальной документации OpenAI"
      transport: "streamable_http"
      url: "https://developers.openai.com/mcp"
